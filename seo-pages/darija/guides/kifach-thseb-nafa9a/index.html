<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>كيفاش كيتحسب النفقة فالمغرب؟</title><meta name="description" content="شرح بالدارجة: كيفاش المحكمة كتقدر النفقة فالمغرب وشنو العوامل اللي كتأثر عليها."/><link rel="canonical" href="https://adalaapp.com/darija/guides/kifach-thseb-nafa9a/"/><style>body{font-family:Tahoma,Arial,sans-serif;line-height:1.9;margin:0}main{max-width:920px;margin:auto;padding:24px}a{color:#7a5a14}</style></head><body><main><h1>كيفاش كيتحسب النفقة فالمغرب؟</h1><p>النفقة ماشي رقم ثابت. كتدخل فيها المداخيل، المصاريف، عدد الأطفال، وحاجياتهم. كلما كان الملف واضح بالأرقام والوثائق، كيزيد احتمال قرار منصف.</p><p><a href="/darija/osra/">ارجع لدليل الأسرة بالدارجة</a> · <a href="/">فتح التطبيق</a></p></main></body></html>
